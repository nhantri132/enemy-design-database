<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enemy Design Database</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V5N3XLTNXR"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-V5N3XLTNXR');
    </script>
    
    <style>
        :root {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #d5dce0;
            --bg-header: #2c3e50;
            --text-primary: #333;
            --text-secondary: #7f8c8d;
            --text-tertiary: #555;
            --text-inverse: #ffffff;
            --border-color: #ddd;
            --border-light: #eee;
            --border-dark: #bdc3c7;
            --shadow: rgba(0,0,0,0.1);
            --hover-bg: #f8f9fa;
            --highlight-bg: #fff3cd;
            --accent-blue: #3498db;
            --accent-blue-hover: #2980b9;
            --accent-red: #e74c3c;
            --accent-red-hover: #c0392b;
            --accent-green: #27ae60;
            --accent-green-hover: #229954;
            --accent-yellow: #f39c12;
            --accent-purple: #9b59b6;
            --accent-orange: #e67e22;
            --secondary-gray: #95a5a6;
            --secondary-gray-hover: #7f8c8d;
            --light-gray: #ecf0f1;
            --light-blue: #e8f4f8;
            --light-blue-hover: #d4ebf2;
        }

        body.dark-mode {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #3a3a3a;
            --bg-header: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --text-tertiary: #b0b0b0;
            --text-inverse: #e0e0e0;
            --border-color: #4a4a4a;
            --border-light: #3f3f3f;
            --border-dark: #555555;
            --shadow: rgba(0,0,0,0.3);
            --hover-bg: #3a3a3a;
            --highlight-bg: #4a4a2a;
            --accent-blue: #4fa8e8;
            --accent-blue-hover: #3d8ac7;
            --accent-red: #ff6b6b;
            --accent-red-hover: #ee5a52;
            --accent-green: #51cf66;
            --accent-green-hover: #40c057;
            --accent-yellow: #ffd43b;
            --accent-purple: #b197fc;
            --accent-orange: #ff922b;
            --secondary-gray: #868e96;
            --secondary-gray-hover: #6c757d;
            --light-gray: #3a3a3a;
            --light-blue: #2a3a42;
            --light-blue-hover: #324651;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: var(--bg-header);
            color: var(--text-inverse);
            padding: 20px 0;
            margin-bottom: 0;
            position: relative;
        }

        header h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 15px;
        }
        
        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .header-user {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .header-user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }
        
        .header-stats {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
        }
        
        .header-stats strong {
            font-size: 24px;
            color: var(--accent-blue);
        }

        .dark-mode-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            color: var(--text-inverse);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 10;
        }

        .dark-mode-toggle:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        .dark-mode-toggle:active {
            transform: scale(0.95);
        }

        .auth-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }
        
        .workspace {
            background: var(--bg-tertiary);
            padding: 30px 0;
            margin-bottom: 0;
            border-bottom: 3px solid var(--border-dark);
        }
        
        .workspace .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .content-section {
            padding-top: 40px;
        }

        .filters {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 2px 4px var(--shadow);
        }

        .filters.hidden {
            display: none;
        }

        .filters h3 {
            margin-bottom: 15px;
            color: var(--text-primary);
            font-size: 16px;
        }

        .filters-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            margin-bottom: 15px;
            padding: 5px;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .filters-header:hover {
            background: var(--hover-bg);
        }

        .filter-toggle-icon {
            font-size: 14px;
            transition: transform 0.3s;
            color: var(--text-secondary);
        }

        .filter-toggle-icon.expanded {
            transform: rotate(180deg);
        }

        .filter-grid.hidden {
            display: none;
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filter-item {
            display: flex;
            flex-direction: column;
        }

        .filter-item label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 5px;
            font-weight: 500;
        }

        .filter-item select {
            padding: 8px;
            border: 2px solid var(--border-color);
            border-radius: 5px;
            font-size: 14px;
            background: var(--bg-secondary);
            cursor: pointer;
        }

        .active-filters {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 0;
        }

        .filter-tag {
            background: var(--accent-blue);
            color: var(--text-inverse);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .filter-tag-close {
            cursor: pointer;
            font-weight: bold;
        }

        .clear-filters {
            padding: 6px 12px;
            background: var(--accent-red);
            color: var(--text-inverse);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .search-box {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 5px;
            font-size: 16px;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .search-box:focus {
            border-color: var(--accent-blue);
            outline: none;
        }

        input, select, textarea {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        .btn {
            padding: 12px 24px;
            background: var(--accent-blue);
            color: var(--text-inverse);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: background 0.3s;
        }

        .btn:hover {
            background: var(--accent-blue-hover);
        }

        .btn:disabled {
            background: var(--border-dark);
            cursor: not-allowed;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 14px;
        }

        .btn-danger { background: var(--accent-red); }
        .btn-danger:hover { background: var(--accent-red-hover); }
        .btn-secondary { background: var(--secondary-gray); }
        .btn-secondary:hover { background: var(--secondary-gray-hover); }
        .btn-success { background: var(--accent-green); }
        .btn-success:hover { background: var(--accent-green-hover); }

        .form-section {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 2px 4px var(--shadow);
            max-height: 80vh;
            overflow-y: auto;
        }

        .form-section.hidden { display: none; }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: var(--text-tertiary);
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--border-color);
            border-radius: 5px;
            font-size: 14px;
        }

        .complex-section {
            background: var(--hover-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .list-item {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 4px solid #3498db;
        }

        .enemy-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 768px) {
            .enemy-list { grid-template-columns: 1fr; }
        }

        .enemy-card {
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .enemy-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            filter: blur(20px) brightness(0.3);
            z-index: 0;
            transform: scale(1.1);
        }

        .enemy-card > * { position: relative; z-index: 1; }

        .enemy-title h3 {
            color: var(--text-inverse);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .enemy-game {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: var(--light-gray);
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge.type { background: var(--accent-blue); color: var(--text-inverse); }
        .badge.size { background: var(--accent-purple); color: var(--text-inverse); }
        .badge.weapon { background: var(--accent-orange); color: var(--text-inverse); }

        .enemy-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-light);
        }

        .enemy-section h4 {
            color: var(--text-inverse);
            margin-bottom: 10px;
            font-size: 14px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .action-display {
            background: var(--hover-bg);
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .enemy-notes {
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        .enemy-links a {
            color: #5dade2;
            text-decoration: none;
            font-size: 14px;
            margin-right: 10px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        .enemy-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: flex-end;
        }

        .pagination {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal.active { display: flex; align-items: center; justify-content: center; }

        .modal-content {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .game-thumbnail {
            width: 80px; height: 80px;
            object-fit: cover;
            border-radius: 6px;
            box-shadow: 0 2px 4px var(--shadow);
        }

        .enemy-detailed-info {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .enemy-detailed-info.expanded {
            max-height: 5000px;
        }

        .expand-button {
            margin-top: 15px;
            padding: 8px 16px;
            background: var(--hover-bg);
            border: 1px solid var(--border-dark);
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .variant-link {
            background: var(--light-blue);
            padding: 5px 10px;
            border-radius: 5px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <header>
        <button class="dark-mode-toggle" id="darkModeToggle" onclick="toggleDarkMode()">
            <span id="darkModeIcon">🌙</span>
        </button>
        <div class="container">
            <h1>🎮 Enemy Design Database</h1>
            <div class="header-info">
                <div class="header-user" id="headerUser"></div>
                <div class="header-stats">
                    <span id="headerEnemyCount">-</span> <span>enemies cataloged</span>
                </div>
            </div>
            <a class="about-link" onclick="openAbout()" style="position: absolute; top: 20px; right: 20px; color: var(--text-inverse); cursor: pointer;">ℹ️ About</a>
        </div>
    </header>

    <div id="aboutModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeAbout()" style="position: absolute; top: 10px; right: 15px; font-size: 28px; cursor: pointer;">&times;</span>
            <h2>About Enemy Design Database</h2>
            <p style="margin-top: 15px;">Reference tool for action-adventure enemy designs.</p>
            <p style="margin-top: 10px;">Created by Tri Nguyen. <a href="https://linktr.ee/trigrows" target="_blank">linktr.ee/trigrows</a></p>
        </div>
    </div>

    <div class="workspace hidden" id="workspace">
        <div class="container">
            <div class="controls" id="controls">
                <input type="text" id="searchBox" class="search-box" placeholder="Search enemies...">
                <button class="btn" id="addNewBtn" disabled>+ Add New Enemy</button>
            </div>

            <div class="filters" id="filters">
                <div class="filters-header" onclick="toggleFilters()">
                    <h3>🔍 Filters</h3>
                    <span class="filter-toggle-icon" id="filterToggleIcon">▼</span>
                </div>
                <div class="filter-grid hidden" id="filterGrid">
                    <div class="filter-item"><label>Game</label><select id="filterGame" onchange="applyFilters()"><option value="">All Games</option></select></div>
                    <div class="filter-item"><label>Enemy Type</label><select id="filterType" onchange="applyFilters()"><option value="">All Types</option></select></div>
                    <div class="filter-item"><label>Enemy Size</label><select id="filterSize" onchange="applyFilters()"><option value="">All Sizes</option></select></div>
                </div>
                <div class="active-filters" id="activeFilters"></div>
            </div>

            <div class="filters" id="sortSection">
                <h3 style="margin-bottom: 15px;">📊 Sort</h3>
                <div class="filter-item">
                    <label>Sort By</label>
                    <select id="sortField" onchange="applySorting()">
                        <option value="nameAZ">Enemy Name (A-Z)</option>
                        <option value="nameZA">Enemy Name (Z-A)</option>
                        <option value="gameAZ">Game (A-Z)</option>
                        <option value="gameZA">Game (Z-A)</option>
                        <option value="sizeSmallLarge">Size (Small → Large)</option>
                        <option value="sizeLargeSmall">Size (Large → Small)</option>
                        <option value="typeWeakStrong">Type (Regular → Boss)</option>
                        <option value="typeStrongWeak">Type (Boss → Regular)</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="container content-section">
        <div class="form-section hidden" id="formSection">
            <h2 id="formTitle">Add New Enemy</h2>
            <form id="enemyForm">
                <div class="form-group">
                    <label>Enemy Name *</label>
                    <input type="text" id="enemyName" required>
                </div>
                <div class="form-group">
                    <label>Game *</label>
                    <select id="gameName" required onchange="handleGameSelection()">
                        <option value="">Select a game...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Enemy Type</label>
                    <select id="enemyType">
                        <option value="">Select Type</option>
                        <option value="Regular">Regular</option>
                        <option value="Elite">Elite</option>
                        <option value="Mini-Boss">Mini-Boss</option>
                        <option value="Boss">Boss</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Enemy Size</label>
                    <select id="enemySize">
                        <option value="">Select Size</option>
                        <option value="Tiny">Tiny</option>
                        <option value="Small">Small</option>
                        <option value="Medium">Medium</option>
                        <option value="Large">Large</option>
                        <option value="Huge">Huge</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Weapon Type</label>
                    <input type="text" id="enemyWeapon" list="weaponOptions">
                    <datalist id="weaponOptions"></datalist>
                </div>
                <div class="form-group">
                    <label>Reference Link</label>
                    <input type="url" id="referenceLink">
                </div>
                <div class="form-group">
                    <label>Video Link</label>
                    <input type="url" id="videoLink">
                </div>
                <div class="form-group">
                    <label>Image Link</label>
                    <input type="url" id="imageLink">
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="notes"></textarea>
                </div>

                <div class="complex-section">
                    <h3>Offensive Actions <button type="button" class="btn btn-small btn-success" onclick="addOffensiveAction()">+ Add</button></h3>
                    <div id="offensiveActionsList"></div>
                </div>

                <div class="complex-section">
                    <h3>Defensive Actions <button type="button" class="btn btn-small btn-success" onclick="addDefensiveAction()">+ Add</button></h3>
                    <div id="defensiveActionsList"></div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn" id="saveBtn">Save Enemy</button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                </div>
            </form>
        </div>

        <div id="mainContent" class="loading" style="text-align: center; padding: 40px;">Loading...</div>
        <div class="enemy-list" id="enemyList"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAyBO6IwnOdqFbC7Hf65sifksRDaKnjZmM",
            authDomain: "enemy-design-database.firebaseapp.com",
            databaseURL: "https://enemy-design-database-default-rtdb.firebaseio.com",
            projectId: "enemy-design-database",
            storageBucket: "enemy-design-database.firebasestorage.app",
            messagingSenderId: "652811505513",
            appId: "1:652811505513:web:cbe13d7665b4fa991177f8"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let currentUser = null;
        let enemies = {};
        let gameImages = {};
        let editingKey = null;
        let currentPage = 1;
        const itemsPerPage = 20;

        let offensiveActions = [];
        let defensiveActions = [];

        auth.onAuthStateChanged((user) => {
            currentUser = user;
            renderAuthSection();
            loadGameImages();
            loadEnemies();
        });

        function renderAuthSection() {
            const headerUser = document.getElementById('headerUser');
            if (currentUser) {
                headerUser.innerHTML = `<span>${currentUser.displayName.split(' ')[0]}</span> <button onclick="auth.signOut()">Sign out</button>`;
                document.getElementById('addNewBtn').disabled = false;
            } else {
                headerUser.innerHTML = `<button onclick="signIn()">Sign in</button>`;
                document.getElementById('addNewBtn').disabled = true;
            }
        }

        function signIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }

        function loadEnemies() {
            database.ref('enemies').on('value', (snapshot) => {
                enemies = snapshot.val() || {};
                renderEnemies();
                updateCount();
                populateFilterOptions();
                document.getElementById('mainContent').style.display = 'none';
                document.getElementById('workspace').classList.remove('hidden');
            });
        }

        function loadGameImages() {
            database.ref('gameImages').on('value', (snapshot) => {
                gameImages = snapshot.val() || {};
            });
        }

        function updateCount() {
            const count = Object.keys(enemies).length;
            document.getElementById('headerEnemyCount').textContent = count;
        }

        function renderEnemies(searchTerm = '') {
            const listContainer = document.getElementById('enemyList');
            let enemyArray = Object.keys(enemies).map(key => ({ key, ...enemies[key] }));

            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                enemyArray = enemyArray.filter(e => e.name.toLowerCase().includes(term) || e.game.toLowerCase().includes(term));
            }

            // Apply Filters
            const filterGame = document.getElementById('filterGame').value;
            if (filterGame) enemyArray = enemyArray.filter(e => e.game === filterGame);

            // Apply Sorting
            enemyArray = sortEnemies(enemyArray);

            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedEnemies = enemyArray.slice(startIndex, startIndex + itemsPerPage);

            listContainer.innerHTML = paginatedEnemies.map(enemy => {
                const gameImage = gameImages[enemy.game];
                const bgStyle = gameImage ? `style="--bg-image: url('${gameImage}')"` : '';
                
                return `
                    <div class="enemy-card" id="enemy-${enemy.key}" ${bgStyle}>
                        <div class="enemy-compact-info" style="display:flex; gap:15px;">
                            ${enemy.imageLink || gameImage ? `<img src="${enemy.imageLink || gameImage}" class="game-thumbnail">` : ''}
                            <div class="enemy-content">
                                <div class="enemy-title">
                                    <h3>${enemy.name}</h3>
                                    <div class="enemy-game">${enemy.game}</div>
                                </div>
                                <div class="enemy-badges">
                                    ${enemy.type ? `<span class="badge type">${enemy.type}</span>` : ''}
                                    ${enemy.size ? `<span class="badge size">${enemy.size}</span>` : ''}
                                </div>
                                <button class="expand-button" onclick="toggleEnemyDetails('${enemy.key}')">Details</button>
                            </div>
                        </div>
                        <div class="enemy-detailed-info" id="details-${enemy.key}">
                            <p class="enemy-notes">${enemy.notes || ''}</p>
                        </div>
                        <div class="enemy-actions">
                            ${currentUser ? `<button onclick="editEnemy('${enemy.key}')">Edit</button> <button onclick="deleteEnemy('${enemy.key}')">Delete</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function sortEnemies(enemyArray) {
            const sortField = document.getElementById('sortField').value;
            return [...enemyArray].sort((a, b) => {
                if (sortField === 'nameAZ') return a.name.localeCompare(b.name);
                if (sortField === 'nameZA') return b.name.localeCompare(a.name);
                return 0;
            });
        }

        function toggleEnemyDetails(key) {
            const details = document.getElementById(`details-${key}`);
            details.classList.toggle('expanded');
        }

        function populateFilterOptions() {
            const games = new Set();
            Object.values(enemies).forEach(e => games.add(e.game));
            const select = document.getElementById('filterGame');
            select.innerHTML = '<option value="">All Games</option>' + 
                Array.from(games).sort().map(g => `<option value="${g}">${g}</option>`).join('');
        }

        function applyFilters() { renderEnemies(document.getElementById('searchBox').value); }
        function applySorting() { renderEnemies(document.getElementById('searchBox').value); }

        function showForm(isEdit = false, key = null) {
            document.getElementById('formSection').classList.remove('hidden');
            if (isEdit) {
                editingKey = key;
                const e = enemies[key];
                document.getElementById('enemyName').value = e.name;
                document.getElementById('gameName').value = e.game;
            } else {
                editingKey = null;
                document.getElementById('enemyForm').reset();
            }
        }

        function hideForm() { document.getElementById('formSection').classList.add('hidden'); }

        document.getElementById('enemyForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const enemy = {
                name: document.getElementById('enemyName').value,
                game: document.getElementById('gameName').value,
                type: document.getElementById('enemyType').value,
                size: document.getElementById('enemySize').value,
                notes: document.getElementById('notes').value
            };
            
            if (editingKey) {
                database.ref('enemies/' + editingKey).update(enemy);
            } else {
                database.ref('enemies').push(enemy);
            }
            hideForm();
        });

        function editEnemy(key) { showForm(true, key); }
        function deleteEnemy(key) { if (confirm('Delete?')) database.ref('enemies/' + key).remove(); }
        
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
            document.getElementById('darkModeIcon').textContent = isDark ? '☀️' : '🌙';
        }

        document.getElementById('addNewBtn').addEventListener('click', () => showForm());
        document.getElementById('cancelBtn').addEventListener('click', hideForm);
        document.getElementById('searchBox').addEventListener('input', (e) => renderEnemies(e.target.value));

        function openAbout() { document.getElementById('aboutModal').classList.add('active'); }
        function closeAbout() { document.getElementById('aboutModal').classList.remove('active'); }

        if (localStorage.getItem('darkMode') === 'enabled') {
            document.body.classList.add('dark-mode');
            document.getElementById('darkModeIcon').textContent = '☀️';
        }
    </script>
</body>
</html>
